services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-acemcp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./acemcp-relay
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_ADDR: 0.0.0.0:3009
      AUGMENT_API_URL: ${AUGMENT_API_URL:-}
      AUGMENT_API_TOKEN: ${AUGMENT_API_TOKEN:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-acemcp}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_KEY_CACHE_TTL: ${API_KEY_CACHE_TTL:-1h}
      SESSION_TTL: ${SESSION_TTL:-5m}
    ports:
      - "3009:3009"

  frontend:
    build:
      context: ./acemcp-relay-frontend
      args:
        NEXT_PUBLIC_RELAY_URL: ${NEXT_PUBLIC_RELAY_URL:-http://localhost:3009/}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-replace-with-a-random-session-secret}
      WEB_SESSION_TTL: ${WEB_SESSION_TTL:-12h}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-admin}
      BOOTSTRAP_ADMIN_USER_ID: ${BOOTSTRAP_ADMIN_USER_ID:-admin}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-ACE Admin}
      BOOTSTRAP_ADMIN_NOTE: ${BOOTSTRAP_ADMIN_NOTE:-Bootstrap administrator}
      BOOTSTRAP_ADMIN_API_KEY: ${BOOTSTRAP_ADMIN_API_KEY:-}
      NEXT_PUBLIC_RELAY_URL: ${NEXT_PUBLIC_RELAY_URL:-http://localhost:3009/}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-acemcp}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"

volumes:
  postgres-data:
